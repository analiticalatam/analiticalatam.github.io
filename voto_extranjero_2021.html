<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#f0ede8;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 16px}
h1{font-family:Georgia,serif;font-size:24px;font-weight:700;color:#f0ede8;margin-bottom:2px}
.sub{font-size:11px;color:#666;letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px}
.stats{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;justify-content:center}
.stat{background:#141414;border:.5px solid #1e1e1e;border-radius:8px;padding:7px 12px;text-align:center;min-width:72px}
.stat .v{font-size:15px;font-weight:700;color:#f0ede8}
.stat .l{font-size:8px;color:#777;text-transform:uppercase;letter-spacing:.06em;margin-top:1px}
.legend{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-bottom:14px}
.leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#aaa;padding:3px 7px;background:#141414;border:.5px solid #1e1e1e;border-radius:4px}
.leg-dot{width:8px;height:8px;border-radius:50%}
.wrap{width:100%;max-width:1000px;overflow-y:auto;max-height:calc(100vh-240px);border:.5px solid #1a1a1a;border-radius:8px}
table{border-collapse:collapse;width:100%;font-size:11px}
th{font-size:8px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#666;text-align:left;padding:6px 5px;border-bottom:1px solid #222;position:sticky;top:0;background:#0f0f0f;z-index:1;white-space:nowrap}
th.r{text-align:right}
td{padding:4px 5px;border-bottom:.5px solid #181818;color:#999;white-space:nowrap}
td.r{text-align:right;font-weight:600;color:#f0ede8;font-variant-numeric:tabular-nums}
.cont{font-size:9px;font-weight:600;color:#666;letter-spacing:.06em;text-transform:uppercase;padding:6px 5px 2px}
.win-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}
.win-name{vertical-align:middle;font-size:10px}
a{color:#666;text-decoration:none;margin-top:16px;font-size:11px;transition:color .12s}
a:hover{color:#d4904a}
@media(max-width:600px){
  body{padding:12px 6px}
  h1{font-size:18px}
  table{font-size:10px}
  td,th{padding:3px 4px}
}
</style>
</head>
